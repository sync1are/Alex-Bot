<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synclare AI - Interactive Voice Chat</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .chat-container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .chat-header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .bot-avatar.speaking {
            animation: avatarPulse 1s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.8);
            }
        }

        .bot-info h1 {
            font-size: 22px;
            font-weight: 700;
            color: white;
            margin-bottom: 3px;
        }

        .status {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            z-index: 10;
            position: relative;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: messageSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .message.bot .message-bubble {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            color: white;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .message.system .message-bubble {
            background: rgba(255, 200, 0, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            font-style: italic;
            text-align: center;
            margin: 0 auto;
            border: 1px solid rgba(255, 200, 0, 0.3);
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .typing-indicator.active {
            display: block;
            animation: messageSlide 0.3s ease;
        }

        .typing-indicator span {
            height: 10px;
            width: 10px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .voice-visualizer {
            padding: 15px 20px;
            text-align: center;
            display: none;
        }

        .voice-visualizer.active {
            display: block;
        }

        .sound-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 40px;
        }

        .sound-bar {
            width: 4px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            animation: soundWave 0.8s ease-in-out infinite;
        }

        .sound-bar:nth-child(2) { animation-delay: 0.1s; }
        .sound-bar:nth-child(3) { animation-delay: 0.2s; }
        .sound-bar:nth-child(4) { animation-delay: 0.3s; }
        .sound-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes soundWave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        .voice-status-text {
            color: white;
            font-size: 13px;
            margin-top: 8px;
            font-weight: 500;
        }

        .input-container {
            padding: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s;
        }

        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        #messageInput:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
        }

        button {
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        #voiceButton {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
            font-size: 22px;
        }

        #voiceButton:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.6);
        }

        #voiceButton.speaking {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            animation: micPulse 0.8s infinite;
        }

        @keyframes micPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        #clearButton {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 50%;
            font-size: 18px;
        }

        #clearButton:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <div class="bot-avatar" id="botAvatar">🧠</div>
                <div class="bot-info">
                    <h1>Synclare AI</h1>
                    <div class="status">
                        <span class="status-dot"></span>
                        <span id="connectionStatus">Connecting...</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="clearButton" title="Clear chat">🗑️</button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="voice-visualizer" id="voiceVisualizer">
                <div class="sound-wave">
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                </div>
                <div class="voice-status-text" id="voiceStatusText">Listening...</div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type or speak your message..." 
                autocomplete="off"
            />
            <button id="voiceButton" title="Voice input">🎤</button>
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
            particlesContainer.appendChild(particle);
        }

        const socket = io();
        
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const voiceButton = document.getElementById('voiceButton');
        const clearButton = document.getElementById('clearButton');
        const connectionStatus = document.getElementById('connectionStatus');
        const typingIndicator = document.getElementById('typingIndicator');
        const voiceVisualizer = document.getElementById('voiceVisualizer');
        const voiceStatusText = document.getElementById('voiceStatusText');
        const botAvatar = document.getElementById('botAvatar');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                voiceButton.classList.add('speaking');
                voiceVisualizer.classList.add('active');
                voiceStatusText.textContent = '🎤 Listening...';
            };

            recognition.onend = () => {
                isListening = false;
                voiceButton.classList.remove('speaking');
                voiceVisualizer.classList.remove('active');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                messageInput.value = transcript;
                sendMessage();
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                voiceStatusText.textContent = '❌ Error';
                setTimeout(() => voiceVisualizer.classList.remove('active'), 2000);
            };
        }

        const synth = window.speechSynthesis;

        function speakText(text) {
            if (synth.speaking) {
                synth.cancel();
            }

            const cleanText = text.replace(/\*([^*]+)\*/g, '$1');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            const voices = synth.getVoices();
            const preferredVoice = voices.find(voice => 
                voice.name.includes('Google') || 
                voice.name.includes('Microsoft') ||
                voice.lang === 'en-US'
            );
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.onstart = () => {
                botAvatar.classList.add('speaking');
                voiceVisualizer.classList.add('active');
                voiceStatusText.textContent = '🔊 Speaking...';
            };

            utterance.onend = () => {
                botAvatar.classList.remove('speaking');
                voiceVisualizer.classList.remove('active');
            };

            synth.speak(utterance);
        }

        socket.on('connect', () => {
            connectionStatus.textContent = 'Online';
        });

        socket.on('disconnect', () => {
            connectionStatus.textContent = 'Disconnected';
        });

        socket.on('status', (data) => {
            addMessage(data.message, 'system');
        });

        socket.on('bot_response', (data) => {
            typingIndicator.classList.remove('active');
            addMessage(data.message, data.type || 'bot');
            
            if (data.type !== 'system') {
                speakText(data.message);
            }
        });

        socket.on('error', (data) => {
            typingIndicator.classList.remove('active');
            addMessage(data.message, 'system');
        });

        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;
            
            messageDiv.appendChild(bubbleDiv);
            messagesContainer.insertBefore(messageDiv, typingIndicator);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            typingIndicator.classList.add('active');
            
            socket.emit('user_message', { message: message });
            
            messageInput.value = '';
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        voiceButton.addEventListener('click', () => {
            if (!recognition) {
                alert('Voice input not supported in this browser');
                return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        clearButton.addEventListener('click', () => {
            if (confirm('Clear conversation history?')) {
                socket.emit('clear_chat');
                const messages = messagesContainer.querySelectorAll('.message');
                messages.forEach(msg => msg.remove());
            }
        });

        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = () => {
                console.log('Voices loaded');
            };
        }

        messageInput.focus();
    </script>
</body>
</html>
